<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, setDoc, getDoc, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { 
  getAuth, 
  signInWithRedirect, 
  getRedirectResult, 
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBzmeMSvdS6dUgEGUFLs5SkGvZ8GNfyiVg",
  authDomain: "chat-app-1d953.firebaseapp.com",
  projectId: "chat-app-1d953",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

let currentChat = null;

// ✅ LOGIN
function login() {
  signInWithRedirect(auth, provider);
}
window.login = login;

// ✅ AFTER REDIRECT
getRedirectResult(auth).then((result) => {
  if (result) {
    loadChats();
    loadLeaderboard();
  }
});

// ✅ AUTO LOGIN DETECT (VERY IMPORTANT)
onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log("Logged in:", user.displayName);
    loadChats();
    loadLeaderboard();
  }
});

// ✅ CREATE GROUP
function createGroup() {
  const name = prompt("Group name?");
  if (!name) return;

  addDoc(collection(db, "chats"), {
    type: "group",
    name: name,
    members: [auth.currentUser.uid]
  });
}

// ✅ LOAD CHATS
function loadChats() {
  onSnapshot(collection(db, "chats"), (snap) => {
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    snap.forEach(docu => {
      let li = document.createElement("li");
      li.className = "chat-item";
      li.textContent = docu.data().name || "DM Chat";

      li.onclick = () => openChat(docu.id);
      list.appendChild(li);
    });
  });
}

// ✅ OPEN CHAT
function openChat(chatId) {
  currentChat = chatId;

  const q = query(collection(db, "messages"), where("chatId", "==", chatId));

  onSnapshot(q, (snap) => {
    const msgBox = document.getElementById("messages");
    msgBox.innerHTML = "";

    snap.forEach(docu => {
      let div = document.createElement("div");
      div.textContent = docu.data().sender + ": " + docu.data().text;
      msgBox.appendChild(div);
    });
  });
}

// ✅ SEND MESSAGE
async function sendMessage() {
  if (!currentChat) {
    alert("Select a chat first!");
    return;
  }

  const msg = document.getElementById("msg").value;
  if (!msg) return;

  await addDoc(collection(db, "messages"), {
    chatId: currentChat,
    sender: auth.currentUser.displayName,
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
  updatePoints();
}

// ✅ UPDATE POINTS
async function updatePoints() {
  const userRef = doc(db, "users", auth.currentUser.uid);
  const snap = await getDoc(userRef);

  let points = 1;
  if (snap.exists()) {
    points = snap.data().points + 1;
  }

  await setDoc(userRef, {
    name: auth.currentUser.displayName,
    points: points
  });
}

// ✅ LEADERBOARD
function loadLeaderboard() {
  const q = query(collection(db, "users"), orderBy("points", "desc"));

  onSnapshot(q, (snap) => {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    snap.forEach(docu => {
      let li = document.createElement("li");
      li.textContent = docu.data().name + " - " + docu.data().points;
      list.appendChild(li);
    });
  });
}

window.sendMessage = sendMessage;
window.createGroup = createGroup;

</script>
