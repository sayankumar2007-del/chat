<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
</head>
<body>

<h2>Simple Chat</h2>

<input id="msg" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBzmeMSvdS6dUgEGUFLs5SkGvZ8GNfyiVg",
  authDomain: "chat-app-1d953.firebaseapp.com",
  projectId: "chat-app-1d953",
  storageBucket: "chat-app-1d953.firebasestorage.app",
  messagingSenderId: "960272389618",
  appId: "1:960272389618:web:5b7d680f6e80b83d6dc76b",
  measurementId: "G-6ZSK0D8WBJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const msgList = document.getElementById("messages");

function sendMessage() {
  const msg = document.getElementById("msg").value;
  addDoc(collection(db, "chat"), { text: msg });
}

// Real-time update
onSnapshot(collection(db, "chat"), (snapshot) => {
  msgList.innerHTML = "";
  snapshot.forEach(doc => {
    let li = document.createElement("li");
    li.textContent = doc.data().text;
    msgList.appendChild(li);
  });
});

window.sendMessage = sendMessage;
</script>

</body>
</html>
