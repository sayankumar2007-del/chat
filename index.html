<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anime Chat App</title>

<style>
body { margin:0; font-family: Arial; background:#2c2f33; color:white; }
.container { display:flex; height:100vh; }

/* Sidebar */
.sidebar {
  width:25%;
  background:#23272a;
  padding:10px;
}
.sidebar h3 { text-align:center; }
.chat-item {
  padding:10px;
  cursor:pointer;
  background:#2c2f33;
  margin:5px 0;
}
.chat-item:hover { background:#40444b; }

/* Chat */
.chat {
  width:75%;
  display:flex;
  flex-direction:column;
}
.messages {
  flex:1;
  padding:10px;
  overflow-y:auto;
}
.input {
  display:flex;
}
.input input {
  flex:1;
  padding:10px;
}
.input button {
  padding:10px;
}
</style>
</head>

<body>

<button onclick="login()">Login</button>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Chats</h3>
    <button onclick="createGroup()">+ Group</button>
    <ul id="chatList"></ul>

    <h3>Leaderboard</h3>
    <ul id="leaderboard"></ul>
  </div>

  <!-- Chat Area -->
  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="msg" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, setDoc, getDoc, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBzmeMSvdS6dUgEGUFLs5SkGvZ8GNfyiVg",
  authDomain: "chat-app-1d953.firebaseapp.com",
  projectId: "chat-app-1d953",
  storageBucket: "chat-app-1d953.firebasestorage.app",
  messagingSenderId: "960272389618",
  appId: "1:960272389618:web:5b7d680f6e80b83d6dc76b",
  measurementId: "G-6ZSK0D8WBJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

let currentChat = null;

// LOGIN
function login() {
  signInWithPopup(auth, provider).then(() => {
    loadChats();
    loadLeaderboard();
  });
}
window.login = login;

// CREATE GROUP
function createGroup() {
  const name = prompt("Group name?");
  addDoc(collection(db, "chats"), {
    type: "group",
    name: name,
    members: [auth.currentUser.uid]
  });
}

// LOAD CHATS
function loadChats() {
  onSnapshot(collection(db, "chats"), (snap) => {
    const list = document.getElementById("chatList");
    list.innerHTML = "";

    snap.forEach(docu => {
      let li = document.createElement("li");
      li.className = "chat-item";
      li.textContent = docu.data().name || "DM Chat";

      li.onclick = () => openChat(docu.id);
      list.appendChild(li);
    });
  });
}

// OPEN CHAT
function openChat(chatId) {
  currentChat = chatId;

  const q = query(collection(db, "messages"), where("chatId", "==", chatId));

  onSnapshot(q, (snap) => {
    const msgBox = document.getElementById("messages");
    msgBox.innerHTML = "";

    snap.forEach(docu => {
      let div = document.createElement("div");
      div.textContent = docu.data().sender + ": " + docu.data().text;
      msgBox.appendChild(div);
    });
  });
}

// SEND MESSAGE
async function sendMessage() {
  const msg = document.getElementById("msg").value;

  await addDoc(collection(db, "messages"), {
    chatId: currentChat,
    sender: auth.currentUser.displayName,
    text: msg,
    time: Date.now()
  });

  updatePoints();
}

// UPDATE POINTS
async function updatePoints() {
  const userRef = doc(db, "users", auth.currentUser.uid);
  const snap = await getDoc(userRef);

  let points = 1;
  if (snap.exists()) {
    points = snap.data().points + 1;
  }

  await setDoc(userRef, {
    name: auth.currentUser.displayName,
    points: points
  });
}

// LEADERBOARD
function loadLeaderboard() {
  const q = query(collection(db, "users"), orderBy("points", "desc"));

  onSnapshot(q, (snap) => {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    snap.forEach(docu => {
      let li = document.createElement("li");
      li.textContent = docu.data().name + " - " + docu.data().points;
      list.appendChild(li);
    });
  });
}

window.sendMessage = sendMessage;

</script>

</body>
</html>
